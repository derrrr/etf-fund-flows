<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETF Fund Flows Analytics Dashboard</title>
  
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23337ab7'/%3E%3Ctext y='75' x='50' text-anchor='middle' font-family='Arial, sans-serif' font-size='70' font-weight='800' fill='white'%3EE%3C/text%3E%3C/svg%3E">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highcharts/11.4.1/highstock.js"></script>
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-color: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --pos-color: #337ab7;
      --neg-color: #d9534f;
      --border-color: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-color);
      margin: 0; color: var(--text-main);
    }

    .header { text-align: center; padding: 2.5rem 1rem 1rem; }
    .header h1 { margin: 0; font-weight: 800; letter-spacing: -0.025em; font-size: 2.25rem; color: #0f172a; }
    .status-bar { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem; }

    .controls {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 1.25rem; border-bottom: 1px solid var(--border-color);
      text-align: center;
    }

    .period-selector {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 1.5rem; margin-bottom: 1rem;
    }

    .period-selector button {
      padding: 0.5rem 0.2rem; border: none; background: transparent;
      cursor: pointer; font-size: 0.9375rem; font-weight: 600;
      transition: color 0.2s; color: var(--text-muted);
      position: relative;
    }

    .period-selector button:hover { color: var(--pos-color); }
    .period-selector button.active { color: var(--pos-color); font-weight: 800; }
    .period-selector button.active::after {
      content: ""; position: absolute; bottom: -2px; left: 0; width: 100%; height: 3px;
      background: var(--pos-color); border-radius: 2px;
    }

    .range-selector {
      display: flex; justify-content: center; align-items: center;
      gap: 0.75rem; font-size: 0.875rem; color: var(--text-muted);
    }

    .range-selector input[type="date"] {
      padding: 0.4rem 0.6rem; border: 1px solid var(--border-color);
      border-radius: 8px; font-family: inherit; color: var(--text-main);
      background: white;
    }

    .hint-text { margin-top: 1.25rem; font-size: 0.8125rem; color: var(--text-muted); font-weight: 500; font-style: italic; }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 1.5rem; padding: 2rem; max-width: 1600px; margin: 0 auto;
    }

    .card {
      background: var(--card-color); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 1.5rem;
      border: 1px solid #f1f5f9;
      min-height: 460px; display: flex; flex-direction: column;
    }

    .stats {
      margin-top: auto; padding-top: 1rem; border-top: 1px solid #f1f5f9;
      text-align: center; font-weight: 700; font-size: 1.1rem; color: #334155;
    }

    .val-pos { color: var(--pos-color); }
    .val-neg { color: var(--neg-color); }

    .loader { grid-column: 1 / -1; text-align: center; padding: 10rem 1rem; color: #94a3b8; font-size: 1.1rem; }
  </style>
</head>
<body>

<header class="header">
  <h1>ETF Fund Flows</h1>
  <div class="status-bar" id="market-status">Syncing market data...</div>
</header>

<nav class="controls">
  <div class="period-selector" id="period-btns">
    <button data-days="5"   data-label="5D">5D</button>
    <button data-days="20"  data-label="1M" class="active">1M</button>
    <button data-days="60"  data-label="3M">3M</button>
    <button data-days="120" data-label="6M">6M</button>
    <button data-days="240" data-label="1Y">1Y</button>
    <button data-days="720" data-label="3Y">3Y</button>
    <button data-days="YTD" data-label="YTD">YTD</button>
  </div>

  <div class="range-selector">
    <span>From</span>
    <input type="date" id="start-date">
    <span>to</span>
    <input type="date" id="end-date">
  </div>

  <div class="hint-text">Sorted by net flows for the selected period.</div>
</nav>

<main class="grid" id="chart-grid">
  <div class="loader">Initialising engine...</div>
</main>

<script>
  const DATA_URL = 'https://gist.githubusercontent.com/derrrr/a401132be2f115055ef7fb8b8581ceb9/raw/etf_data.json';
  const state = {
    etfList: [],
    currentDays: 20,
    currentLabel: '1M',
    observer: null
  };

  const UI = {
    grid: document.getElementById('chart-grid'),
    status: document.getElementById('market-status'),
    start: document.getElementById('start-date'),
    end: document.getElementById('end-date')
  };

  const fmtDate = (ts) => {
    const d = new Date(ts);
    return `${d.getFullYear()}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')}`;
  };

  /** --- Synchronization Logic --- **/
  ['mousemove', 'touchmove', 'touchstart'].forEach(type => {
    UI.grid.addEventListener(type, (e) => {
      const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.card');
      if (!target) return;

      const ticker = target.dataset.ticker;
      const source = state.etfList.find(c => c.ticker === ticker);
      if (!source?.chart) return;

      const event = source.chart.pointer.normalize(e);
      const point = source.chart.series[0].searchPoint(event, true);

      if (point) {
        state.etfList.forEach(item => {
          if (item.chart && item.isInit) {
            const match = item.chart.series[0].points.find(p => p.x === point.x);
            if (match) {
              match.onMouseOver();
              item.chart.tooltip.refresh(match);
              item.chart.xAxis[0].drawCrosshair(e, match);
            }
          }
        });
      }
    });
  });

  async function boot() {
    try {
      const res = await fetch(`${DATA_URL}?_=${Date.now()}`);
      const data = await res.json();
      UI.grid.innerHTML = '';
      
      const valid = Object.entries(data).filter(([_, v]) => v.series?.length);
      const latestTs = valid[0][1].series.slice(-1)[0][0];
      const latestStr = new Date(latestTs).toISOString().split('T')[0];
      
      UI.status.textContent = `Market Data as of: ${latestStr.replace(/-/g, '/')}`;
      UI.end.value = latestStr;

      initObserver();

      valid.forEach(([ticker, info]) => {
        const item = {
          ticker, category: info.category, rawData: info.series,
          chart: null, node: null, statsNode: null, total: 0, isInit: false
        };
        state.etfList.push(item);
        // Placeholders created but not appended yet
        createPlaceholderNode(item);
      });

      // Pass default button to trigger first sort and render
      refreshDashboard(document.querySelector('button[data-days="20"]'));
    } catch (err) {
      UI.grid.innerHTML = `<div class="loader" style="color:var(--neg-color)">System Error: ${err.message}</div>`;
    }
  }

  function createPlaceholderNode(item) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.ticker = item.ticker;
    card.innerHTML = `<div id="canvas_${item.ticker}" style="height:380px;"></div><div class="stats"></div>`;
    item.node = card;
    item.statsNode = card.querySelector('.stats');
  }

  function initObserver() {
    state.observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const ticker = entry.target.dataset.ticker;
          const item = state.etfList.find(i => i.ticker === ticker);
          if (item && !item.isInit) buildChart(item);
        }
      });
    }, { rootMargin: '400px', threshold: 0.01 });
  }

  function buildChart(item) {
    item.chart = Highcharts.stockChart(`canvas_${item.ticker}`, {
      chart: { 
        backgroundColor: 'transparent', animation: false, marginLeft: 50, marginRight: 50,
        zooming: { mouseWheel: false, type: null }
      },
      rangeSelector: { enabled: false },
      navigator: { enabled: false },
      scrollbar: { enabled: false },
      credits: { enabled: false },
      tooltip: { 
        shared: true, split: false, valueDecimals: 2,
        backgroundColor: 'rgba(255,255,255,0.95)', borderWidth: 1, borderColor: '#e2e8f0',
        headerFormat: '', 
        pointFormat: '<span style="color:{point.color}">\u25CF</span> {series.name}: <b>{point.y} B</b><br/>'
      },
      title: {
        text: `<span style="font-size:18px; font-weight:700;">${item.ticker}</span> <span style="font-size:12px; font-weight:400; color:#64748b; margin-left:6px;">${item.category}</span>`,
        align: 'left', useHTML: true
      },
      xAxis: {
        dateTimeLabelFormats: { day: '%m/%d', week: '%m/%d', month: '%Y/%m', year: '%Y' },
        crosshair: { 
          width: 1, color: '#94a3b8', 
          label: { enabled: true, backgroundColor: '#1e293b', formatter: (v) => fmtDate(v) }
        },
        gridLineColor: '#f1f5f9'
      },
      yAxis: [
        { title: { text: null }, opposite: false, gridLineColor: '#f1f5f9', labels: { style: { fontSize: '10px', color: '#94a3b8' } }, plotLines: [{ value: 0, width: 1, color: '#cbd5e1', zIndex: 1 }] },
        { title: { text: null }, opposite: true, gridLineColor: 'transparent', labels: { style: { fontSize: '10px', color: '#94a3b8' } } }
      ],
      series: [
        { name: 'Flow', type: 'column', color: '#337ab7', negativeColor: '#d9534f', borderWidth: 0, zIndex: 2, dataGrouping: { enabled: false } },
        { name: 'Cumulative', type: 'area', yAxis: 1, color: 'rgba(99, 102, 241, 0.2)', fillOpacity: 0.1, lineWidth: 1.2, zIndex: 1, marker: { enabled: false }, dataGrouping: { enabled: false } }
      ]
    });
    item.isInit = true;
    syncItemData(item);
  }

  function syncItemData(item) {
    const data = item.rawData;
    let startIdx, endIdx;

    if (state.currentDays === 'CUSTOM') {
      const s = new Date(UI.start.value).getTime();
      const e = new Date(UI.end.value).getTime();
      startIdx = data.findIndex(([ts]) => ts >= s);
      const next = data.findIndex(([ts]) => ts > e);
      endIdx = next === -1 ? data.length - 1 : next - 1;
    } else {
      const last = data.length - 1;
      startIdx = state.currentDays === 'YTD' 
        ? data.findIndex(([ts]) => ts >= new Date(new Date(data[last][0]).getFullYear(), 0, 1).getTime())
        : Math.max(0, last - Number(state.currentDays) + 1);
      endIdx = last;
    }

    if (startIdx === -1) startIdx = 0;
    const slice = data.slice(startIdx, endIdx + 1);
    
    // Calculate total for sorting, whether chart exists or not
    let cumulative = 0;
    slice.forEach(([_, val]) => cumulative += (val || 0));
    item.total = cumulative;

    // If chart is initialized, update it
    if (item.chart) {
      let cumSum = 0;
      const cumArr = slice.map(([ts, val]) => [ts, (cumSum += (val || 0))]);
      
      item.chart.series[0].setData(slice, false);
      item.chart.series[1].setData(cumArr, false);
      item.chart.xAxis[0].setExtremes(slice[0][0], slice[slice.length-1][0], true, false);
      item.statsNode.innerHTML = `${state.currentLabel} Net Flows: <span class="${cumulative >= 0 ? 'val-pos' : 'val-neg'}">${cumulative.toFixed(2)} B</span>`;
    }
  }

  function refreshDashboard(btn) {
    if (btn) {
      document.querySelectorAll('.period-selector button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.currentDays = btn.dataset.days;
      state.currentLabel = btn.dataset.label;
    } else {
      document.querySelectorAll('.period-selector button').forEach(b => b.classList.remove('active'));
      state.currentDays = 'CUSTOM';
      state.currentLabel = 'Custom Range';
    }

    // 1. Calculate totals for ALL items based on raw data, update initialized charts
    state.etfList.forEach(item => syncItemData(item));
    
    // 2. Sort the list by pre-calculated total
    state.etfList.sort((a, b) => b.total - a.total);
    
    // 3. Render/re-append nodes in sorted order
    state.etfList.forEach(item => {
      UI.grid.appendChild(item.node);
      state.observer.observe(item.node); // Start observing sorted node
      if (item.isInit) item.chart.reflow();
    });
  }

  UI.start.addEventListener('change', () => UI.end.value && refreshDashboard(null));
  UI.end.addEventListener('change', () => UI.start.value && refreshDashboard(null));
  document.getElementById('period-btns').addEventListener('click', e => {
    if (e.target.tagName === 'BUTTON') refreshDashboard(e.target);
  });

  window.addEventListener('DOMContentLoaded', boot);
</script>

</body>
</html>
